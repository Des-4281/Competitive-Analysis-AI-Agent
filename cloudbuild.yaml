steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/competitive-analysis-agent:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/competitive-analysis-agent:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/competitive-analysis-agent:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/competitive-analysis-agent:latest'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'competitive-analysis-agent'
      - '--image=gcr.io/$PROJECT_ID/competitive-analysis-agent:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=OPENAI_BASE_URL=https://api.openai.com/v1'

images:
  - 'gcr.io/$PROJECT_ID/competitive-analysis-agent:latest'

options:
  logging: CLOUD_LOGGING_ONLY